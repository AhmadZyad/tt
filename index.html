<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دابەزێنەر و بڵاوکەرەوەی گشتگیر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;700&display=swap');
        
        body { 
            font-family: 'Noto Sans Arabic', sans-serif; 
            background-color: #f8fafc; 
        }
        
        .gradient-bg { 
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); 
        }

        .loader { 
            border-top-color: #4f46e5; 
            animation: spin 1s linear infinite; 
        }
        
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        
        #splash-screen {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .tab-active {
            border-bottom: 4px solid #4f46e5;
            color: #4f46e5;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="bg-white p-8 rounded-3xl shadow-2xl text-center max-w-md mx-4 border-t-8 border-indigo-600">
            <div class="text-indigo-600 text-6xl mb-6">
                <i class="fas fa-mosque"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-6 leading-relaxed">
                إنَّ اللهَ مِن فَوقِ العَرشِ يَقُولُ:<br>
                <span class="text-indigo-600 text-3xl">صَلُّوا على رَسُولِ الله</span>
            </h2>
            <button onclick="closeSplash()" class="gradient-bg w-full py-5 rounded-2xl text-white font-bold text-xl shadow-lg hover:opacity-90 transition-all active:scale-95">
                اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ
            </button>
        </div>
    </div>

    <!-- Header -->
    <header class="w-full max-w-4xl text-center py-8">
        <h1 class="text-3xl font-bold text-gray-800">سیستەمی زیرەکی ڤیدیۆ</h1>
        <p class="text-gray-500 mt-2">داگرتن و بڵاوکردنەوەی ڤیدیۆ لە یەک شوێندا</p>
    </header>

    <!-- Navigation Tabs -->
    <div class="flex w-full max-w-2xl bg-white shadow-sm rounded-t-2xl border-b overflow-hidden">
        <button onclick="switchTab('download')" id="tab-download" class="flex-1 py-4 font-bold tab-active transition-all">
            <i class="fas fa-cloud-download-alt ml-2"></i> داگرتن
        </button>
        <button onclick="switchTab('upload')" id="tab-upload" class="flex-1 py-4 font-bold text-gray-400 transition-all">
            <i class="fas fa-paper-plane ml-2"></i> بڵاوکردنەوە
        </button>
    </div>

    <!-- Main Content -->
    <main class="w-full max-w-2xl bg-white rounded-b-2xl shadow-xl p-8 mb-10 border-x border-b border-gray-100">
        
        <!-- SECTION: DOWNLOAD -->
        <div id="section-download" class="flex flex-col gap-6">
            <div class="text-right">
                <label class="block text-sm font-bold text-gray-700 mb-2">لینکی ڤیدیۆکە (تیکتۆک، فەیسبووک، هتد):</label>
                <input type="text" id="videoUrl" dir="ltr" placeholder="https://..." 
                       class="w-full p-4 rounded-xl border-2 border-gray-100 focus:border-indigo-500 focus:outline-none transition-all text-left">
            </div>
            <button onclick="processDownload()" id="downloadBtn" class="gradient-bg w-full py-4 rounded-xl text-white text-lg font-bold shadow-md hover:opacity-90 transition-all">
                دەستپێکردنی داگرتن
            </button>
            
            <div id="download-loading" class="hidden flex flex-col items-center py-4">
                <div class="loader rounded-full border-4 border-t-4 border-gray-200 h-10 w-10 mb-2"></div>
                <p class="text-indigo-600 text-sm font-bold">خەریکی وەرگرتنی ڤیدیۆکەین...</p>
            </div>

            <div id="download-result" class="hidden p-6 bg-green-50 rounded-2xl border border-green-200 text-center">
                <h3 class="text-green-800 font-bold mb-4">ڤیدیۆکە ئامادەیە!</h3>
                <button id="finalDlBtn" class="bg-green-600 text-white px-8 py-3 rounded-xl font-bold shadow-sm">داگرتن (MP4)</button>
            </div>
        </div>

        <!-- SECTION: UPLOAD (USING THE PROVIDED API) -->
        <div id="section-upload" class="hidden flex flex-col gap-6">
            <div class="bg-indigo-50 p-4 rounded-xl text-xs text-indigo-700 border border-indigo-100 leading-relaxed">
                <i class="fas fa-info-circle ml-1"></i>
                ئەم بەشە ڤیدیۆ بڵاو دەکاتەوە لە ڕێگەی API تایبەت بە <b>upload-post.com</b>.
            </div>

            <div class="grid grid-cols-1 gap-4 text-right">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">هەڵبژاردنی ڤیدیۆ:</label>
                    <input type="file" id="uploadFile" accept="video/*" class="w-full p-2 border border-dashed border-gray-300 rounded-lg bg-gray-50">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">ناونیشانی ڤیدیۆ:</label>
                    <input type="text" id="uploadTitle" placeholder="ناونیشانێک بنووسە..." class="w-full p-3 rounded-xl border border-gray-200 focus:border-indigo-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">ناوی پڕۆفایل (User):</label>
                    <input type="text" id="uploadUser" placeholder="your_profile_user" class="w-full p-3 rounded-xl border border-gray-200 focus:border-indigo-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">پلاتفۆرم:</label>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" value="tiktok" checked class="w-4 h-4 text-indigo-600"> تیکتۆک
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" value="facebook" class="w-4 h-4 text-indigo-600"> فەیسبووک
                        </label>
                    </div>
                </div>
            </div>

            <button onclick="processUpload()" id="uploadBtnAction" class="bg-indigo-600 w-full py-4 rounded-xl text-white text-lg font-bold shadow-md hover:bg-indigo-700 transition-all">
                <i class="fas fa-cloud-upload-alt ml-2"></i> ئێستا بڵاوی بکەرەوە
            </button>

            <div id="upload-status" class="hidden p-4 rounded-xl text-center font-bold"></div>
        </div>
    </main>

    <footer class="text-gray-400 text-xs py-10">
        © 2024 هەموو مافەکان پارێزراون
    </footer>

    <script>
        const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJlbWFpbCI6Imthcmt1a2t1cmRzdGFuMTRAZ21haWwuY29tIiwiZXhwIjo0OTMwMzUxODI4LCJqdGkiOiJkNmJmMDYwOC02Yzc1LTRhMjktYmYwNy1jZWYxNTJiMjI3OTIifQ.FExkbPr2Nm0lG9WX-tGfub0djPsruExM-JgR-lXolGo";

        function closeSplash() {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => splash.style.display = 'none', 500);
        }

        function switchTab(tab) {
            const sections = {
                download: document.getElementById('section-download'),
                upload: document.getElementById('section-upload')
            };
            const tabs = {
                download: document.getElementById('tab-download'),
                upload: document.getElementById('tab-upload')
            };

            Object.keys(sections).forEach(k => {
                sections[k].classList.add('hidden');
                tabs[k].classList.remove('tab-active', 'text-gray-800');
                tabs[k].classList.add('text-gray-400');
            });

            sections[tab].classList.remove('hidden');
            tabs[tab].classList.add('tab-active', 'text-gray-800');
            tabs[tab].classList.remove('text-gray-400');
        }

        // DOWNLOAD LOGIC
        async function processDownload() {
            const url = document.getElementById('videoUrl').value.trim();
            const loading = document.getElementById('download-loading');
            const result = document.getElementById('download-result');
            
            if(!url) return alert("تکایە لینکەکە دابنێ");

            loading.classList.remove('hidden');
            result.classList.add('hidden');

            try {
                // بەکارهێنانی سێرڤەری تیکتۆک وەک نموونە چونکە خێراترینە
                const res = await fetch(`https://api.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                
                if(data.code === 0) {
                    const dlBtn = document.getElementById('finalDlBtn');
                    dlBtn.onclick = () => window.open(data.data.play, '_blank');
                    result.classList.remove('hidden');
                } else {
                    alert("نەتوانرا ڤیدیۆکە بدۆزرێتەوە");
                }
            } catch (e) {
                alert("هەڵەیەک ڕوویدا");
            } finally {
                loading.classList.add('hidden');
            }
        }

        // UPLOAD LOGIC (USING YOUR PROVIDED CURL LOGIC)
        async function processUpload() {
            const fileInput = document.getElementById('uploadFile');
            const title = document.getElementById('uploadTitle').value;
            const user = document.getElementById('uploadUser').value;
            const status = document.getElementById('upload-status');
            const btn = document.getElementById('uploadBtnAction');

            if (!fileInput.files[0] || !title || !user) {
                return alert("تکایە هەموو زانیارییەکان پڕ بکەرەوە");
            }

            status.classList.remove('hidden', 'bg-red-50', 'text-red-600', 'bg-green-50', 'text-green-600');
            status.classList.add('bg-gray-100', 'text-gray-600');
            status.innerText = "خەریکی بڵاوکردنەوەیە، تکایە چاوەڕوانبە...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append('video', fileInput.files[0]);
            formData.append('title', title);
            formData.append('user', user);
            
            // وەرگرتنی پلاتفۆرمە دیاریکراوەکان
            const platforms = Array.from(document.querySelectorAll('#section-upload input[type="checkbox"]:checked')).map(cb => cb.value);
            platforms.forEach(p => formData.append('platform[]', p));

            try {
                const response = await fetch('https://api.upload-post.com/api/upload', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Apikey ${API_KEY}`
                    },
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    status.classList.replace('bg-gray-100', 'bg-green-50');
                    status.classList.replace('text-gray-600', 'text-green-600');
                    status.innerText = "ڤیدیۆکە بە سەرکەوتوویی بڵاوکرایەوە!";
                } else {
                    throw new Error(result.message || "هەڵەیەک ڕوویدا");
                }
            } catch (e) {
                status.classList.replace('bg-gray-100', 'bg-red-50');
                status.classList.replace('text-gray-600', 'text-red-600');
                status.innerText = "هەڵە: " + e.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
